{% extends "core/base.html" %}

{% block title %}Delete Album{% endblock %}

{% block content %}
<h2>Delete Album</h2>
<p>Are you sure you want to delete "{{ album.title }}" by {{ album.artist.name }}?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'album_detail' album.pk %}">Cancel</a>
</form>
{% endblock %}
