{% extends "core/base.html" %}

{% block title %}{% if form.instance.pk %}Edit{% else %}Create{% endif %} Album{% endblock %}

{% block content %}
<h2>{% if form.instance.pk %}Edit{% else %}Create{% endif %} Album</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">
        {% if form.instance.pk %}Update{% else %}Create{% endif %}
    </button>
    <a href="{% url 'album_list' %}">Cancel</a>
</form>
{% endblock %}
